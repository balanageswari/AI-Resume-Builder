<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Resume Builder</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

  <div class="form-section">
    <h2>Enter Details</h2>

    <input type="file" id="photo" accept="image/*">

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="linkedin" placeholder="LinkedIn URL">
    <input type="text" id="github" placeholder="GitHub URL">
    <textarea id="address" placeholder="Address"></textarea>

    <textarea id="objective" placeholder="Career Objective"></textarea>
    <textarea id="education" placeholder="Education Details"></textarea>
    <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
    <textarea id="projects" placeholder="Projects"></textarea>
    <textarea id="experience" placeholder="Experience"></textarea>
    <textarea id="hobbies" placeholder="Hobbies (comma separated)"></textarea>
    <textarea id="declaration" placeholder="Declaration"></textarea>

    <button onclick="generateResume()">Generate Resume</button>
    <button onclick="downloadPDF()">Download Resume</button>
  </div>

  <div class="preview-section">
    <div id="resume"></div>
  </div>

</div>

<script>

let uploadedImage = "";

document.getElementById("photo").addEventListener("change", function(event){
  const reader = new FileReader();
  reader.onload = function(){
    uploadedImage = reader.result;
  }
  if(event.target.files[0]){
    reader.readAsDataURL(event.target.files[0]);
  }
});

function generateResume(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const linkedin = document.getElementById("linkedin").value;
  const github = document.getElementById("github").value;
  const address = document.getElementById("address").value;
  const objective = document.getElementById("objective").value;
  const education = document.getElementById("education").value;
  const skills = document.getElementById("skills").value.split(",");
  const projects = document.getElementById("projects").value;
  const experience = document.getElementById("experience").value;
  const hobbies = document.getElementById("hobbies").value.split(",");
  const declaration = document.getElementById("declaration").value;

  document.getElementById("resume").innerHTML = `
    <div class="header">
      ${uploadedImage ? `<img src="${uploadedImage}" width="120">` : ""}
      <h2>${name}</h2>
      <p>${email}</p>
      <p>${linkedin}</p>
      <p>${github}</p>
      <p>${address}</p>
    </div>

    <div class="section">
      <h3>Career Objective</h3>
      <p>${objective}</p>
    </div>

    <div class="section">
      <h3>Education</h3>
      <p>${education}</p>
    </div>

    <div class="section">
      <h3>Skills</h3>
      <ul>
        ${skills.map(skill => `<li>${skill.trim()}</li>`).join("")}
      </ul>
    </div>

    <div class="section">
      <h3>Projects</h3>
      <p>${projects}</p>
    </div>

    <div class="section">
      <h3>Experience</h3>
      <p>${experience}</p>
    </div>

    <div class="section">
      <h3>Hobbies</h3>
      <ul>
        ${hobbies.map(hobby => `<li>${hobby.trim()}</li>`).join("")}
      </ul>
    </div>

    <div class="section">
      <h3>Declaration</h3>
      <p>${declaration}</p>
    </div>
  `;
}

async function downloadPDF(){
  const resume = document.getElementById("resume");

  const canvas = await html2canvas(resume);
  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');

  const width = pdf.internal.pageSize.getWidth();
  const height = (canvas.height * width) / canvas.width;

  pdf.addImage(imgData,'PNG',0,0,width,height);
  pdf.save("Resume.pdf");
}

</script>

</body>
</html>
